<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"/>
<title>학교 공유 캘린더</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',system-ui,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.title{font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px}
.subtitle{font-size:13px;color:#888;margin-top:3px}
.auth-area{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mode-badge{font-size:12px;padding:5px 12px;border-radius:20px;font-weight:600}
.mode-edit{background:#d1fae5;color:#065f46}
.mode-view{background:#f1f0ec;color:#666}
button{font-family:inherit;cursor:pointer}
.auth-btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:7px 14px;font-size:13px;color:#333;transition:background 0.15s}
.auth-btn:hover{background:#f5f5f5}
.cal-nav{display:flex;align-items:center;gap:16px;margin-bottom:1.25rem}
.nav-btn{background:#fff;border:1px solid #ddd;border-radius:8px;width:34px;height:34px;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.nav-btn:hover{background:#f0f0f0}
.cal-month{font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;width:100%}
.day-label{text-align:center;font-size:12px;color:#999;padding:6px 0;font-weight:600;overflow:hidden}
.day-label.sun{color:#e24b4a}
.day-label.sat{color:#378add}
.day-cell{min-height:90px;min-width:0;width:100%;overflow:hidden;border:1px solid #e8e6e0;border-radius:8px;padding:7px;background:#fff;transition:background 0.1s;position:relative}
.day-cell.other{background:#faf9f6;opacity:0.55}
.day-cell.today{border:2px solid #378add}
.day-cell.clickable{cursor:pointer}
.day-cell.clickable:hover{background:#f5f5f5}
.day-num{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.day-cell.sun-col .day-num{color:#e24b4a}
.day-cell.sat-col .day-num{color:#378add}
.event-chip{display:block;box-sizing:border-box;width:100%;font-size:11px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500}
.more-ev{font-size:10px;color:#378add;font-weight:600;margin-top:2px;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;display:block;width:100%;text-align:left;text-decoration:underline}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1.25rem;color:#1a1a1a}
.modal label{font-size:12px;color:#888;display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.modal input,.modal textarea,.modal select{width:100%;margin-bottom:14px;font-size:14px;font-family:inherit;border:1px solid #ddd;border-radius:8px;padding:9px 12px;color:#1a1a1a;background:#fff;outline:none;transition:border 0.15s}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:#378add}
.modal textarea{height:70px;resize:vertical}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-primary{background:#1a1a1a;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;transition:opacity 0.15s}
.btn-primary:hover{opacity:0.8}
.btn-cancel{background:#fff;border:1px solid #ddd;padding:9px 16px;border-radius:8px;font-size:14px;color:#666;font-family:inherit}
.btn-cancel:hover{background:#f5f5f5}
.btn-danger{background:#fee2e2;color:#991b1b;border:none;padding:9px 14px;border-radius:8px;font-size:14px;font-family:inherit}
.btn-danger:hover{background:#fecaca}
.pw-hint{font-size:12px;color:#aaa;margin-top:-10px;margin-bottom:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:10px;padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.detail-chip{display:inline-block;font-size:11px;padding:3px 10px;border-radius:5px;font-weight:600;margin-bottom:10px}
.detail-note{font-size:13px;color:#666;background:#f8f7f4;border-radius:8px;padding:10px;margin-bottom:12px;line-height:1.6}
.loading{text-align:center;padding:3rem;color:#aaa;font-size:14px}
@media(max-width:700px){
  .wrap{padding:0.5rem 2px}
  .title{font-size:16px}
  .subtitle{font-size:11px}
  .cal-month{font-size:15px}
  .header{margin-bottom:0.75rem}
  .cal-nav{margin-bottom:0.6rem}
  .mode-badge{font-size:11px;padding:3px 8px}
  .auth-btn{font-size:11px;padding:5px 9px}
  .nav-btn{width:28px;height:28px;font-size:15px}
  /* 그리드: 화면 너비에 맞게, 고정 min-width 없음 */
  .grid{gap:1px;width:100%}
  .day-label{font-size:9px;padding:4px 0}
  /* 셀 높이: JS가 주입, 기본값 충분히 */
  .day-cell{min-height:60px;padding:3px 2px;border-radius:4px}
  .day-num{font-size:10px;margin-bottom:2px;text-align:center}
  /* 폰트: JS가 동적으로 조정 */
  .event-chip{font-size:var(--chip-fs,8px);padding:1px 3px;border-radius:2px;margin-bottom:1px}
  .more-ev{font-size:var(--chip-fs,8px)}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="title">📅 학교 공유 캘린더</div>
      <div class="subtitle" id="mode-desc">데이터 불러오는 중...</div>
    </div>
    <div class="auth-area">
      <span class="mode-badge mode-view" id="mode-badge">👁 조회 모드</span>
      <button class="auth-btn" id="auth-btn">🔑 교사 로그인</button>
    </div>
  </div>
  <div class="cal-nav">
    <button class="nav-btn" id="prev-btn">‹</button>
    <span class="cal-month" id="month-label"></span>
    <button class="nav-btn" id="next-btn">›</button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="cal-scroll-wrap">
    <div id="cal-grid" class="grid"><div class="loading" style="grid-column:1/-1">⏳ 일정을 불러오는 중...</div></div>
  </div>
</div>
<div id="modal-area"></div>
<div class="toast" id="toast"></div>

<!-- Firebase SDK (CDN) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPNJqXuFKwaxCxeS08uUfvp2qmXn5shYI",
  authDomain: "guri-school-cal.firebaseapp.com",
  databaseURL: "https://guri-school-cal-default-rtdb.firebaseio.com",
  projectId: "guri-school-cal",
  storageBucket: "guri-school-cal.firebasestorage.app",
  messagingSenderId: "40866826129",
  appId: "1:40866826129:web:3bae8af776ce6cc3f47c30"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const auth = getAuth(app);

const TEACHER_EMAIL = "123@456.com";

const COLORS = [
  {bg:"#dbeafe",text:"#1e40af",name:"파랑"},
  {bg:"#d1fae5",text:"#065f46",name:"초록"},
  {bg:"#ffedd5",text:"#9a3412",name:"주황"},
  {bg:"#fce7f3",text:"#9d174d",name:"분홍"},
  {bg:"#ede9fe",text:"#5b21b6",name:"보라"},
  {bg:"#fef3c7",text:"#92400e",name:"노랑"},
];

let isTeacher = false;
let currentYear, currentMonth;
let events = {};
let editingId = null;
const today = new Date();

// Firebase 실시간 동기화
const eventsRef = ref(db, 'events');
onValue(eventsRef, (snapshot) => {
  events = snapshot.val() || {};
  render();
  document.getElementById('mode-desc').textContent =
    isTeacher ? '교사 모드 — 일정을 추가·수정·삭제할 수 있습니다' : '조회 모드 — 일정을 확인하세요';
});

// 인증 상태 감지
onAuthStateChanged(auth, (user) => {
  isTeacher = !!user;
  document.getElementById('mode-badge').className = 'mode-badge ' + (isTeacher ? 'mode-edit' : 'mode-view');
  document.getElementById('mode-badge').textContent  = isTeacher ? '✏️ 교사 모드' : '👁 조회 모드';
  document.getElementById('mode-desc').textContent   = isTeacher ? '교사 모드 — 일정을 추가·수정·삭제할 수 있습니다' : '조회 모드 — 일정을 확인하세요';
  document.getElementById('auth-btn').textContent    = isTeacher ? '🚪 로그아웃' : '🔑 교사 로그인';
  render();
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 렌더 ──────────────────────────────────────────
function render() { renderLegend(); renderGrid(); }

function renderLegend() {
  const leg  = document.getElementById('legend');
  const evArr = Object.values(events);
  const cats = [...new Set(evArr.map(e => e.category || '기타'))];
  if (!cats.length) { leg.innerHTML = ''; return; }
  leg.innerHTML = cats.map(c => {
    const ev  = evArr.find(e => (e.category || '기타') === c);
    const col = COLORS[(ev ? ev.colorIdx : 0) % COLORS.length];
    return `<div class="legend-item"><div class="legend-dot" style="background:${col.bg};border:1px solid ${col.text}33"></div>${c}</div>`;
  }).join('');
}

function renderGrid() {
  document.getElementById('month-label').textContent = `${currentYear}년 ${currentMonth + 1}월`;
  const grid      = document.getElementById('cal-grid');
  const dayNames  = ['일','월','화','수','목','금','토'];
  let html = dayNames.map((d, i) =>
    `<div class="day-label ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');

  const firstDow   = new Date(currentYear, currentMonth, 1).getDay();
  const lastDate   = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevLast   = new Date(currentYear, currentMonth, 0).getDate();

  for (let i = 0; i < firstDow; i++) {
    html += `<div class="day-cell other"><div class="day-num" style="color:#ccc">${prevLast - firstDow + 1 + i}</div></div>`;
  }
  for (let d = 1; d <= lastDate; d++) {
    const dateStr  = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvs   = Object.entries(events).filter(([,e]) => isInRange(dateStr, e.date, e.endDate || e.date));
    const isToday  = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===d;
    const dow      = (firstDow + d - 1) % 7;
    const dowCls   = dow===0 ? 'sun-col' : dow===6 ? 'sat-col' : '';
    let chips = '';
    dayEvs.slice(0, 2).forEach(([id, ev]) => {
      const col = COLORS[ev.colorIdx % COLORS.length];
      chips += `<div class="event-chip" style="background:${col.bg};color:${col.text}" onclick="openDetail('${id}',event)">${ev.title}</div>`;
    });
    if (dayEvs.length > 2) chips += `<button class="more-ev" onclick="openDayList('${dateStr}',event)">+${dayEvs.length - 2}개 더보기</button>`;
    html += `<div class="day-cell ${isToday?'today':''} ${dowCls} ${isTeacher?'clickable':''}" onclick="dayClick('${dateStr}',event)">
      <div class="day-num">${d}</div>${chips}</div>`;
  }
  const rem = (7 - (firstDow + lastDate) % 7) % 7;
  for (let i = 1; i <= rem; i++) {
    html += `<div class="day-cell other"><div class="day-num" style="color:#ccc">${i}</div></div>`;
  }
  grid.innerHTML = html;
}

function isInRange(dateStr, start, end) { return dateStr >= start && dateStr <= (end || start); }

// ── 전역 이벤트 핸들러 (onclick에서 호출) ──────────
window.dayClick = function(dateStr, e) {
  if (e.target.classList.contains('event-chip') || e.target.classList.contains('more-ev')) return;
  if (isTeacher) {
    showAddModal(dateStr);
  } else {
    // 조회 모드: 해당 날 일정 있으면 목록 팝업
    const dayEvs = Object.entries(events).filter(([,ev]) => isInRange(dateStr, ev.date, ev.endDate || ev.date));
    if (dayEvs.length > 0) openDayList(dateStr, e);
  }
};

window.openDayList = function(dateStr, e) {
  if (e && e.stopPropagation) e.stopPropagation();
  const dayEvs = Object.entries(events).filter(([,ev]) => isInRange(dateStr, ev.date, ev.endDate || ev.date));
  const [y, m, d] = dateStr.split('-');
  const dateLabel = `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
  let listHtml = '';
  if (dayEvs.length === 0) {
    listHtml = '<div style="text-align:center;color:#bbb;padding:1.5rem 0;font-size:14px">일정이 없습니다</div>';
  } else {
    listHtml = dayEvs.map(([id, ev]) => {
      const col = COLORS[ev.colorIdx % COLORS.length];
      const editBtns = isTeacher
        ? `<div style="display:flex;gap:6px;margin-top:6px">
             <button class="btn-danger" style="font-size:12px;padding:4px 10px" onclick="deleteEvent('${id}')">삭제</button>
             <button class="btn-cancel" style="font-size:12px;padding:4px 10px" onclick="showEditModal('${id}')">수정</button>
           </div>` : '';
      return `<div style="padding:10px 0;border-bottom:1px solid #f0eeea">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col.bg};border:1px solid ${col.text}44;flex-shrink:0"></span>
          <span style="font-size:15px;font-weight:600;color:#1a1a1a">${ev.title}</span>
        </div>
        <div style="font-size:12px;color:#aaa;padding-left:18px">${ev.category||'기타'}${ev.endDate && ev.endDate !== ev.date ? ' · ~'+ev.endDate : ''}</div>
        ${ev.note ? `<div style="font-size:12px;color:#888;padding-left:18px;margin-top:3px;line-height:1.5">${ev.note.replace(/\n/g,'<br>')}</div>` : ''}
        ${editBtns}
      </div>`;
    }).join('');
  }
  setModal(`<h3>📅 ${dateLabel}</h3>
    <div style="max-height:60vh;overflow-y:auto">${listHtml}</div>
    <div class="btn-row" style="margin-top:12px">
      ${isTeacher ? `<button class="btn-cancel" onclick="closeModal();showAddModal('${dateStr}')">+ 추가</button>` : ''}
      <button class="btn-primary" onclick="closeModal()">닫기</button>
    </div>`);
};

window.openDetail = function(id, e) {
  e.stopPropagation();
  const ev  = events[id];
  if (!ev) return;
  const col = COLORS[ev.colorIdx % COLORS.length];
  setModal(`<h3>📌 일정 상세</h3>
    <div style="font-size:17px;font-weight:700;margin-bottom:6px;color:#1a1a1a">${ev.title}</div>
    <div style="font-size:13px;color:#888;margin-bottom:10px">📅 ${ev.date}${ev.endDate&&ev.endDate!==ev.date?' ~ '+ev.endDate:''}</div>
    <span class="detail-chip" style="background:${col.bg};color:${col.text}">${ev.category||'기타'}</span>
    ${ev.note ? `<div class="detail-note">${ev.note.replace(/\n/g,'<br>')}</div>` : ''}
    <div class="btn-row">
      ${isTeacher ? `<button class="btn-danger" onclick="deleteEvent('${id}')">삭제</button>
      <button class="btn-cancel" onclick="showEditModal('${id}')">수정</button>` : ''}
      <button class="btn-primary" onclick="closeModal()">닫기</button>
    </div>`);
};

window.deleteEvent = function(id) {
  const ev = events[id];
  if (!ev) return;
  setModal(`<h3>🗑️ 일정 삭제</h3>
    <p style="font-size:14px;color:#444;margin-bottom:1.25rem;line-height:1.6">
      <strong>${ev.title}</strong> 일정을 삭제하시겠습니까?<br>
      <span style="font-size:12px;color:#aaa">이 작업은 되돌릴 수 없습니다.</span>
    </p>
    <div class="btn-row">
      <button class="btn-cancel" onclick="openDetail('${id}',{stopPropagation:()=>{}})">취소</button>
      <button class="btn-danger" onclick="confirmDelete('${id}')">삭제 확인</button>
    </div>`);
};

window.confirmDelete = async function(id) {
  try {
    await remove(ref(db, 'events/' + id));
    closeModal();
    showToast('삭제되었습니다');
  } catch(e) { showToast('삭제 실패: ' + e.message); }
};

window.showEditModal = function(id) {
  const ev = events[id];
  if (!ev) return;
  editingId = id;
  const colorOpts = COLORS.map((c,i) => `<option value="${i}" ${i===ev.colorIdx?'selected':''}>${c.name}</option>`).join('');
  setModal(`<h3>✏️ 일정 수정</h3>
    <label>제목 *</label>
    <input type="text" id="ev-title" value="${ev.title}"/>
    <label>시작 날짜 *</label>
    <input type="date" id="ev-date" value="${ev.date}"/>
    <label>종료 날짜</label>
    <input type="date" id="ev-enddate" value="${ev.endDate||ev.date}"/>
    <label>분류</label>
    <input type="text" id="ev-cat" value="${ev.category||''}"/>
    <label>색상</label>
    <select id="ev-color">${colorOpts}</select>
    <label>메모</label>
    <textarea id="ev-note">${ev.note||''}</textarea>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveEvent()">저장</button>
    </div>`);
};

function showAddModal(dateStr) {
  editingId = null;
  const colorOpts = COLORS.map((c,i) => `<option value="${i}">${c.name}</option>`).join('');
  setModal(`<h3>➕ 일정 추가</h3>
    <label>제목 *</label>
    <input type="text" id="ev-title" placeholder="예: 학부모 상담주간"/>
    <label>시작 날짜 *</label>
    <input type="date" id="ev-date" value="${dateStr}"/>
    <label>종료 날짜 (여러 날인 경우)</label>
    <input type="date" id="ev-enddate" value="${dateStr}"/>
    <label>분류</label>
    <input type="text" id="ev-cat" placeholder="예: 행사, 시험, 방학, 회의"/>
    <label>색상</label>
    <select id="ev-color">${colorOpts}</select>
    <label>메모</label>
    <textarea id="ev-note" placeholder="추가 내용..."></textarea>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveEvent()">저장</button>
    </div>`);
  setTimeout(() => document.getElementById('ev-title')?.focus(), 50);
}

window.saveEvent = async function() {
  const title    = document.getElementById('ev-title')?.value?.trim();
  const date     = document.getElementById('ev-date')?.value;
  const endDate  = document.getElementById('ev-enddate')?.value || date;
  const category = document.getElementById('ev-cat')?.value?.trim() || '기타';
  const colorIdx = parseInt(document.getElementById('ev-color')?.value || '0');
  const note     = document.getElementById('ev-note')?.value?.trim() || '';
  if (!title || !date) { showToast('제목과 날짜를 입력해주세요'); return; }
  const data = { title, date, endDate, category, colorIdx, note };
  try {
    if (editingId) {
      await update(ref(db, 'events/' + editingId), data);
      showToast('일정이 수정되었습니다 ✅');
    } else {
      await push(eventsRef, data);
      showToast('일정이 추가되었습니다 ✅');
    }
    closeModal();
  } catch(e) { showToast('저장 실패: ' + e.message); }
};

// ── 인증 ──────────────────────────────────────────
function showAuthModal() {
  setModal(`<h3>🔑 교사 로그인</h3>
    <label>비밀번호</label>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryLogin()"/>
    <div class="pw-hint">교사 공유 비밀번호를 입력하세요</div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="tryLogin()">로그인</button>
    </div>`);
  setTimeout(() => document.getElementById('pw-input')?.focus(), 50);
}

window.tryLogin = async function() {
  const pw = document.getElementById('pw-input')?.value;
  if (!pw) return;
  try {
    await signInWithEmailAndPassword(auth, TEACHER_EMAIL, pw);
    closeModal();
    showToast('교사 모드로 로그인되었습니다 ✅');
  } catch(e) { showToast('비밀번호가 틀렸습니다 ❌'); }
};

document.getElementById('auth-btn').addEventListener('click', async () => {
  if (isTeacher) {
    await signOut(auth);
    showToast('로그아웃되었습니다');
  } else {
    showAuthModal();
  }
});

// ── 네비게이션 ──────────────────────────────────────
document.getElementById('prev-btn').addEventListener('click', () => {
  if (--currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (++currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
});

// ── 모달 유틸 ──────────────────────────────────────
function setModal(inner) {
  document.getElementById('modal-area').innerHTML =
    `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${inner}</div></div>`;
}
window.closeModal = function() { document.getElementById('modal-area').innerHTML = ''; };


// ── 모바일 폰트 동적 계산 ──────────────────────────
function applyMobileFont() {
  if (window.innerWidth > 700) return;

  // 실제 렌더된 셀 DOM 너비를 읽어서 계산 (가장 정확)
  const firstCell = document.querySelector('.day-cell');
  const cellW = firstCell
    ? firstCell.getBoundingClientRect().width
    : (window.innerWidth - 14) / 7; // fallback: 패딩 14px 제외

  // 한글 1글자 실제 너비 ≈ fontSize * 1.0 (전각)
  // 셀 좌우 패딩 6px 제외한 공간에 13글자
  const chipFs = Math.max(6, Math.floor((cellW - 6) / 13));
  document.documentElement.style.setProperty('--chip-fs', chipFs + 'px');
}
window.addEventListener('resize', applyMobileFont);
// renderGrid 후 DOM이 생긴 뒤에 실행되도록 requestAnimationFrame 사용
const _origRenderGrid = renderGrid;
renderGrid = function() {
  _origRenderGrid();
  requestAnimationFrame(applyMobileFont);
};
applyMobileFont();

// ── 초기화 ──────────────────────────────────────────
currentYear  = today.getFullYear();
currentMonth = today.getMonth();
renderGrid();
</script>
</body>
</html>
